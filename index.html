<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aetheria — A Different Timeline on the Same Planet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Rajdhani:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>

/* ═══════════════════════════════════════════════
   AETHERIA — MASTER COLOR SYSTEM & TOKENS
═══════════════════════════════════════════════ */
:root {
  /* DESERT PALETTE */
  --des-sky-top:    #5A3A14; 
  --des-sky-mid:    #C4904A; 
  --des-sand-near:  #4A3010; 
  --des-sand-far:   #8B6030; 
  --des-rock:       #5A4025; 
  --des-shadow:     #2C1A08; 
  --des-bone:       #F0E0C0; 
  
  /* OASIS PALETTE */
  --oas-jungle-deep: #051A0A;
  --oas-nile:        #1A5A6A;
  --oas-water:       #4ECDC4;
  --oas-jungle-mid:  #1A5A28;
  --oas-leaf:        #2A7A38;
  --oas-amber:       #D4820A;
  --oas-gold:        #C4944A;
  --oas-cream:       #F0E0C0;

  /* MIDNIGHT PALETTE */
  --mid-void:        #020408;
  --mid-purple-deep: #12082A;
  --mid-purple:      #2A0A5A;
  --mid-violet:      #8B3ACA;
  --mid-glow:        #C084FC;
  --mid-teal-elec:   #00FFE0;
  --mid-teal:        #4ECDC4;
  --mid-gold:        #FFB84D;
}

/* ── GLOBAL RESET & INFRASTRUCTURE ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; background-color: var(--mid-void); }

body {
  font-family: 'Rajdhani', sans-serif;
  overflow-x: hidden;
  color: var(--des-bone);
  background: var(--des-sky-top);
  cursor: none;
}

/* ── TYPOGRAPHY UTILITIES ── */
.font-display { font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 0.15em; }
.font-editorial { font-family: 'Cormorant Garamond', serif; font-style: italic; }
.font-ui { font-family: 'Rajdhani', sans-serif; font-weight: 500; }
.font-scribe { font-family: 'Lora', serif; line-height: 1.75; }

/* ── IMMERSIVE UTILITIES ── */
.cursor {
  position: fixed;
  width: 8px; height: 8px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%,-50%);
  transition: width .2s, height .2s, background .4s;
  mix-blend-mode: screen;
}
.cursor-ring {
  position: fixed;
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid rgba(240, 224, 192, 0.25);
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%,-50%);
}

.theme-toggle {
  position: fixed;
  top: 24px; right: 24px;
  z-index: 1000;
  display: flex; gap: 8px;
  background: rgba(44, 26, 8, 0.45);
  backdrop-filter: blur(20px);
  border-radius: 40px;
  padding: 6px;
  border: 1px solid rgba(240, 224, 192, 0.12);
}
.theme-btn {
  font-family: 'Cinzel', serif;
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  padding: 8px 16px; border-radius: 30px; border: none;
  cursor: pointer; background: transparent; color: rgba(240, 224, 192, 0.4);
  min-height: 44px;
  transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
}
.theme-btn.active { color: var(--des-shadow); background: var(--des-sky-mid); font-weight: 900; }

.world { display: none; width: 100%; }
.world.active { display: block; }

/* ════════════════════════════════════════
   THE GOLDEN DESERT — LANDING STATE
════════════════════════════════════════ */
.desert-hero {
  position: relative;
  min-height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* Atmospheric Volumetric Sky */
.d-sky-atmosphere {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, var(--des-sky-top) 0%, #7A4E20 40%, var(--des-sky-mid) 75%, #DDB370 100%);
  z-index: 1;
}

/* Cinematic Sun Bloom Layer */
.d-sun-bloom {
  position: absolute;
  top: -10%; right: 15%;
  width: 75vw; height: 75vw;
  max-width: 900px; max-height: 900px;
  background: radial-gradient(circle at center, rgba(255, 235, 180, 0.45) 0%, rgba(212, 168, 96, 0.15) 35%, rgba(90, 58, 20, 0) 70%);
  z-index: 2;
  pointer-events: none;
}

/* Active SVG Heat Haze Layer */
.d-heat-warp {
  position: absolute;
  inset: 0;
  z-index: 3;
  filter: url(#heavy-haze);
  pointer-events: none;
}

/* Layered Mountains */
.d-mountain-range {
  position: absolute;
  bottom: 25%; left: 0; width: 100%; height: 35vh;
  pointer-events: none;
}
.d-mountain-layer {
  position: absolute;
  bottom: 0; width: 100%; height: 100%;
}
.d-mtn-back {
  background: linear-gradient(to bottom, rgba(122, 78, 32, 0.4) 0%, rgba(74, 48, 16, 0.7) 100%);
  clip-path: polygon(0 100%, 0 65%, 12% 40%, 28% 55%, 45% 20%, 62% 48%, 78% 30%, 90% 50%, 100% 35%, 100% 100%);
  z-index: 4;
  opacity: 0.6;
}
.d-mtn-front {
  background: linear-gradient(to bottom, var(--des-rock) 0%, var(--des-shadow) 100%);
  clip-path: polygon(0 100%, 0 75%, 18% 50%, 35% 68%, 55% 40%, 72% 62%, 85% 45%, 100% 70%, 100% 100%);
  z-index: 5;
  filter: drop-shadow(0 -10px 30px rgba(44, 26, 8, 0.5));
}

/* Volumetric Dunes (Chiaroscuro Light Mapping) */
.d-dunes-container {
  position: absolute;
  bottom: 0; left: 0; width: 100%; height: 32vh;
  z-index: 6;
  pointer-events: none;
}
.d-dune-shadow-map {
  position: absolute;
  bottom: -2px; width: 120%; height: 120%;
}
.d-dune-left {
  left: -10%;
  background: linear-gradient(135deg, var(--des-sand-far) 30%, var(--des-shadow) 75%);
  clip-path: polygon(0 100%, 0 40%, 45% 70%, 100% 30%, 100% 100%);
  width: 65%;
}
.d-dune-right {
  right: -10%;
  background: linear-gradient(225deg, #A47438 20%, var(--des-sand-near) 80%);
  clip-path: polygon(0 100%, 0 60%, 55% 35%, 100% 50%, 100% 100%);
  width: 70%;
}

/* Sand Ripples Overlay Texture */
.d-sand-ripples {
  position: absolute;
  inset: 0;
  opacity: 0.06;
  background-image: repeating-linear-gradient(165deg, transparent, transparent 4px, var(--des-bone) 4px, var(--des-bone) 6px);
}

/* Particle Systems */
#d-dust-canvas {
  position: absolute;
  inset: 0; z-index: 7;
  pointer-events: none;
}

/* Core Interface Content */
.d-content-wrapper {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 40px 24px;
}

.d-studio-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.4em;
  color: var(--des-sky-mid);
  margin-bottom: 24px;
}

/* Etched In Stone Header Typography */
.d-main-title {
  font-size: clamp(4rem, 10vw, 8rem);
  font-weight: 900;
  color: var(--des-shadow);
  line-height: 0.9;
  letter-spacing: 0.22em;
  margin-left: 0.11em;
  position: relative;
  text-shadow: 
    -1px -1px 1px rgba(0, 0, 0, 0.8), 
    1px 1px 1px rgba(255, 235, 180, 0.2),
    0px 8px 30px rgba(44, 26, 8, 0.75);
}

.d-hero-tagline {
  font-size: clamp(20px, 3vw, 28px);
  font-weight: 300;
  color: rgba(240, 224, 192, 0.7);
  margin-top: 16px;
  letter-spacing: 0.05em;
}

.d-architectural-divider {
  width: 80px; height: 1px;
  background: linear-gradient(to right, transparent, var(--des-sky-mid), transparent);
  margin: 32px 0;
}

.d-narrative-block {
  font-size: clamp(16px, 1.8vw, 20px);
  font-weight: 400;
  color: var(--des-bone);
  max-width: 520px;
  line-height: 1.8;
  margin-bottom: 48px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
}

/* Highly Tactile Game Button Interface */
.d-primary-cta {
  background: linear-gradient(to bottom, #7A5020 0%, var(--des-shadow) 100%);
  border: 1px solid rgba(212, 168, 96, 0.35);
  border-top: 1px solid rgba(255, 235, 180, 0.4);
  color: var(--des-bone);
  padding: 20px 56px;
  font-size: 12px;
  font-weight: 700;
  border-radius: 4px;
  box-shadow: 
    0 10px 30px rgba(0, 0, 0, 0.5),
    inset 0 1px 0 rgba(255,255,255,0.05);
  min-height: 48px; min-width: 200px;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
.d-primary-cta:hover {
  transform: translateY(-2px);
  border-color: rgba(212, 168, 96, 0.7);
  box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7), 0 0 12px rgba(212, 168, 96, 0.2);
}

.d-footer-subtext {
  font-size: 11px;
  letter-spacing: 0.25em;
  color: rgba(240, 224, 192, 0.35);
  margin-top: 24px;
}

</style>
</head>
<body>

<svg style="position: absolute; width: 0; height: 0;">
  <filter id="heavy-haze">
    <feTurbulence type="fractalNoise" baseFrequency="0.015 0.07" numOctaves="2" result="warp" />
    <feDisplacementMap in="SourceGraphic" in2="warp" scale="7" xChannelSelector="R" yChannelSelector="G" />
  </filter>
</svg>

<div class="cursor" id="C"></div>
<div class="cursor-ring" id="CR"></div>

<div class="theme-toggle">
  <button class="theme-btn active" data-theme="desert">☀ Desert</button>
  <button class="theme-btn" data-theme="oasis" disabled>🌿 Oasis</button>
  <button class="theme-btn" data-theme="midnight" disabled>⚡ Midnight</button>
</div>

<div class="world active" id="world-desert">
  <section class="desert-hero">
    <div class="d-sky-atmosphere"></div>
    <div class="d-sun-bloom"></div>
    
    <div class="d-heat-warp">
      <div class="d-mountain-range">
        <div class="d-mountain-layer d-mtn-back"></div>
        <div class="d-mountain-layer d-mtn-front"></div>
      </div>
      <div class="d-dunes-container">
        <div class="d-dune-shadow-map d-dune-left"></div>
        <div class="d-dune-shadow-map d-dune-right"><div class="d-sand-ripples"></div></div>
      </div>
    </div>

    <canvas id="d-dust-canvas"></canvas>

    <div class="d-content-wrapper">
      <div class="d-studio-label font-ui">Jupiter's Lab Creative Studio</div>
      <h1 class="d-main-title font-display">Aetheria</h1>
      <p class="d-hero-tagline font-editorial">A different timeline on the same planet</p>
      
      <div class="d-architectural-divider"></div>
      
      <p class="d-narrative-block font-editorial">
        You have been building alone. <br>
        In the heat. Without shelter. <br>
        Without anyone who understands.
      </p>
      
      <button class="d-primary-cta font-display" id="enterBtn">Apply to Enter</button>
      <p class="d-footer-subtext font-ui">The oasis is real &nbsp;·&nbsp; Builders only</p>
    </div>
  </section>
</div>

<script>
const C = document.getElementById('C');
const CR = document.getElementById('CR');
let mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX;
  my = e.clientY;
  C.style.left = mx + 'px';
  C.style.top = my + 'px';
});

(function animateInertialRing() {
  rx += (mx - rx) * 0.1;
  ry += (my - ry) * 0.1;
  CR.style.left = rx + 'px';
  CR.style.top = ry + 'px';
  requestAnimationFrame(animateInertialRing);
})();

C.style.background = 'var(--des-sky-mid)';
C.style.boxShadow = '0 0 15px #FFD060, 0 0 30px #C4904A';

document.querySelectorAll('button').forEach(el => {
  el.addEventListener('mouseenter', () => { C.style.transform = 'translate(-50%,-50%) scale(2.5)'; });
  el.addEventListener('mouseleave', () => { C.style.transform = 'translate(-50%,-50%) scale(1)'; });
});

const canvas = document.getElementById('d-dust-canvas');
const ctx = canvas.getContext('2d');

function sizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
sizeCanvas();
window.addEventListener('resize', sizeCanvas);

const particles = Array.from({ length: 45 }, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  radius: Math.random() * 2 + 0.5,
  alpha: Math.random() * 0.4 + 0.1,
  speedX: Math.random() * 0.4 + 0.1,
  speedY: (Math.random() - 0.5) * 0.15
}));

function renderLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  particles.forEach(p => {
    p.x += p.speedX;
    p.y += p.speedY;
    
    if (p.x > canvas.width) p.x = 0;
    if (p.y > canvas.height || p.y < 0) p.y = Math.random() * canvas.height;
    
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(240, 224, 192, ${p.alpha})`;
    ctx.fill();
  });
  
  requestAnimationFrame(renderLoop);
}
renderLoop();
</script>
</body>
</html>
